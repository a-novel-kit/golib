name: main

on:
  push:
    tags-ignore:
      - "**"
    branches:
      - "**"

jobs:
  generated-go:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version-file: "go.mod"
      - name: go generate
        shell: bash
        run: go generate ./...
      - uses: a-novel-kit/workflows/generic-actions/check-changes@v1.23.1
        with:
          fail_message: go generate definitions are not up-to-date, please run 'go generate ./...' and commit the changes

  lint-go:
    runs-on: ubuntu-latest
    needs: [generated-go]
    permissions:
      contents: read
    steps:
      - uses: a-novel-kit/workflows/go-actions/lint-go@v1.23.1

  lint-proto:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: bufbuild/buf-action@v1

  lint-js:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: a-novel-kit/workflows/node-actions/lint-node@v1.23.1
        with:
          # `lint` is now the local umbrella (go + proto + prettier); the
          # node CI runner has no Go/buf toolchain, so it runs the node-only
          # lane. Functionally identical to the old bare `lint`.
          lint_action: "lint:prettier"
          github_token: ${{ secrets.GITHUB_TOKEN }}
          app_private_key: ${{ secrets.DEPENDENCY_BOT_PRIVATE_KEY }}
          client_id: ${{ vars.DEPENDENCY_BOT_CLIENT_ID }}

  test-go:
    needs: [lint-go]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # The postgres package wraps a real database, so its tests need one. Without
    # this the package cannot be tested at all, which is how a transaction
    # helper that never opened a transaction survived here.
    env:
      POSTGRES_DSN: "postgres://postgres:postgres@localhost:5432/postgres?sslmode=disable"
    services:
      postgres:
        image: postgres:18.4
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        # The job starts as soon as the container is up, which is earlier than
        # the server accepts connections. Without the health gate the first test
        # races the database and fails as a flake nobody can reproduce.
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: a-novel-kit/workflows/go-actions/test-go@v1.23.1
        with:
          modfile: gotestsum.mod
